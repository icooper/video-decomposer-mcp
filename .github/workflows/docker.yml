name: Publish Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - variant: cu128
            base_build: nvidia/cuda:12.8.1-devel-ubuntu22.04
            base_runtime: nvidia/cuda:12.8.1-runtime-ubuntu22.04
            torch_index: https://download.pytorch.org/whl/cu128
            ffmpeg_cuda: "1"
            latest: true
          - variant: cpu
            base_build: ubuntu:22.04
            base_runtime: ubuntu:22.04
            torch_index: https://download.pytorch.org/whl/cpu
            ffmpeg_cuda: "0"
            latest: false
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/icooper/video-decomposer-mcp
          tags: |
            type=semver,pattern={{version}},suffix=-${{ matrix.variant }}
            type=semver,pattern={{major}}.{{minor}},suffix=-${{ matrix.variant }}
            ${{ matrix.latest && 'type=raw,value=latest' || '' }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_BUILD=${{ matrix.base_build }}
            BASE_RUNTIME=${{ matrix.base_runtime }}
            TORCH_INDEX_URL=${{ matrix.torch_index }}
            FFMPEG_CUDA=${{ matrix.ffmpeg_cuda }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
