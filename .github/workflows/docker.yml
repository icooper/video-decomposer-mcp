name: Publish Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to checkout (tag, branch, or SHA). Leave empty to use the branch selected in Run workflow."
        required: false
        type: string

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - variant: cu128
            base_image: ghcr.io/icooper/video-decomposer-base:ffmpeg8.0.1-av17.0.0-cu128
            torch_index: https://download.pytorch.org/whl/cu128
          - variant: cpu
            base_image: ghcr.io/icooper/video-decomposer-base:ffmpeg8.0.1-av17.0.0-cpu
            torch_index: https://download.pytorch.org/whl/cpu
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.event.release.tag_name || github.ref }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: ref
        run: echo "version=${REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
        env:
          REF: ${{ inputs.ref || github.event.release.tag_name || github.ref }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/icooper/video-decomposer-mcp
          flavor: |
            latest=false
            suffix=-${{ matrix.variant }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.ref.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.ref.outputs.version }}
            type=sha

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
            TORCH_INDEX_URL=${{ matrix.torch_index }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
