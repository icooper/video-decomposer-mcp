name: Publish Base Docker Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag for the base image (e.g., ffmpeg8.1-av17.0.0)"
        required: true
        type: string

jobs:
  docker-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - variant: cu128
            base_build: nvidia/cuda:12.8.1-devel-ubuntu22.04
            base_runtime: nvidia/cuda:12.8.1-runtime-ubuntu22.04
            ffmpeg_cuda: "1"
          - variant: cpu
            base_build: ubuntu:22.04
            base_runtime: ubuntu:22.04
            ffmpeg_cuda: "0"
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.base
          push: true
          provenance: false
          tags: |
            ghcr.io/icooper/video-decomposer-base:${{ inputs.tag }}-${{ matrix.variant }}
            ghcr.io/icooper/video-decomposer-base:latest-${{ matrix.variant }}
          build-args: |
            BASE_BUILD=${{ matrix.base_build }}
            BASE_RUNTIME=${{ matrix.base_runtime }}
            FFMPEG_CUDA=${{ matrix.ffmpeg_cuda }}
          cache-from: type=gha,scope=base-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=base-${{ matrix.variant }}
