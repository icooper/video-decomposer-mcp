services:
  mcp:
    image: video-decomposer-mcp:local-cu128
    ports:
      - "8000:8000"
    volumes:
      - ./video_store:/app/video_store
    env_file:
      - path: .env
        required: false
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["all"]  # change to specific GPU IDs if needed
              capabilities: [gpu]
